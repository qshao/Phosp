# Multi-site phosphorylation example
# Phosphorylates two serine residues and runs a production MD simulation.
#
# Replace protein.pdb with your own structure.
#
# Usage:
#   phosp run examples/multisite_pSer/run.yaml

input:
  source: pdb
  path: protein.pdb             # replace with your PDB file
  ph: 7.4

modification:
  sites:
    - chain: A
      resid: 10
      resname: SER
      mod_type: pSer
    - chain: A
      resid: 47
      resname: SER
      mod_type: pSer

forcefield: charmm36m
protocol: globular_protein

simulation:
  production_time_ns: 100.0
  output_freq_ps: 10.0
  water_model: tip3p
  box_type: dodecahedron
  salt_concentration_mM: 150.0
  runner: local                   # "local" | "slurm" | "pbs"
  hpc:                            # used when runner is slurm or pbs
    ntasks: 8
    gpus: 1
    walltime: "24:00:00"
    partition: gpu
    auto_submit: false

analysis:
  plugins:
    - rmsd
    - rmsf
    - radius_of_gyration
    - secondary_structure
    - hbond
    - sasa
  rmsd:
    selection: name CA
  rmsf:
    selection: name CA
  sasa:
    residues: [10, 47]          # focus on phosphorylated sites
